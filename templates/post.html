<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$title — Sigreturn Labs</title>
  <meta name="description" content="$description">
  <meta name="theme-color" content="#f5f1ea" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#14110d" media="(prefers-color-scheme: dark)">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="$title">
  <meta property="og:description" content="$description">
  <meta property="og:url" content="$canonical_url">
  <meta property="og:type" content="article">
  <meta property="og:image" content="https://sigreturn.com/brand/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="article:published_time" content="$date_iso">
  <meta property="article:author" content="$author">
  <meta property="article:section" content="$category">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="$title">
  <meta name="twitter:description" content="$description">
  <meta name="twitter:image" content="https://sigreturn.com/brand/og.png">
  <link rel="canonical" href="$canonical_url">
  <link rel="alternate" type="application/rss+xml" title="Sigreturn Labs Blog" href="/blog/feed.xml">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="512x512" href="/brand/logo-512.png">
  <link rel="preload" href="/fonts/outfit-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/style.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        var dark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="nav">
    <a href="/" class="brand" aria-label="Sigreturn Labs home">
      <img src="/brand/logo.svg" alt="" class="brand-logo brand-logo-light" width="28" height="28">
      <img src="/brand/logo-inverse.svg" alt="" class="brand-logo brand-logo-dark" width="28" height="28">
      <span class="brand-name">Sigreturn Labs</span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      <a href="/blog/" aria-current="page">Blog</a>
    </nav>
    <a href="mailto:contact@sigreturn.com" class="nav-contact">contact@sigreturn.com</a>
    <button id="theme-toggle" type="button" class="theme-toggle" data-theme="auto" aria-label="Theme: auto — click to change" title="Theme: auto">
      <svg class="theme-icon theme-icon-auto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor" stroke="none"/></svg>
      <svg class="theme-icon theme-icon-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="theme-icon theme-icon-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <main class="post-main">
    <section class="post-hero">
      <span class="kicker">$category</span>
      <h1 class="post-title">$title</h1>
      <p class="post-meta">
        <time datetime="$date_iso">$date_human</time>
        <span class="post-meta-sep">&middot;</span>
        <span>$author</span>
      </p>
    </section>

    <article class="post-body">
$content_html
    </article>

    <footer class="post-footer">
$tags_html
      <a href="/blog/" class="back-to-blog">&larr; Back to blog</a>
    </footer>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="/brand/logo-inverse.svg" alt="" class="brand-logo" width="22" height="22">
        <div>
          <p class="footer-name">Sigreturn Labs</p>
          <p class="footer-meta">SASU in registration &middot; RCS Paris</p>
          <p class="footer-meta" data-enc="MSBydWUgTWFyZ3VlcmluLCA3NTAxNCBQYXJpcywgRnJhbmNl">[&hellip;]</p>
        </div>
      </div>
      <nav class="footer-nav" aria-label="Footer">
        <a href="/terms.html">Terms</a>
        <a href="/privacy.html">Privacy</a>
        <a href="mailto:contact@sigreturn.com">Contact</a>
      </nav>
    </div>
    <div class="footer-bottom">
      <span>&copy; 2026 Sigreturn Labs</span>
      <span>sigreturn.com</span>
    </div>
  </footer>

  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (btn) {
        var mql = window.matchMedia('(prefers-color-scheme: dark)');
        function read() {
          try {
            var t = localStorage.getItem('theme');
            if (t === 'light' || t === 'dark') return t;
          } catch (e) {}
          return 'auto';
        }
        function apply(theme) {
          var dark = theme === 'dark' || (theme === 'auto' && mql.matches);
          document.documentElement.classList.toggle('dark', dark);
          btn.setAttribute('data-theme', theme);
          btn.setAttribute('aria-label', 'Theme: ' + theme + ' — click to change');
          btn.setAttribute('title', 'Theme: ' + theme);
        }
        btn.addEventListener('click', function () {
          var cur = read();
          var next = cur === 'auto' ? 'light' : cur === 'light' ? 'dark' : 'auto';
          try {
            if (next === 'auto') localStorage.removeItem('theme');
            else localStorage.setItem('theme', next);
          } catch (e) {}
          apply(next);
        });
        mql.addEventListener('change', function () { if (read() === 'auto') apply('auto'); });
        apply(read());
      }

      document.querySelectorAll('[data-enc]').forEach(function (el) {
        try {
          el.textContent = decodeURIComponent(escape(atob(el.dataset.enc)));
          el.removeAttribute('data-enc');
        } catch (e) {}
      });
    })();
  </script>
</body>
</html>
